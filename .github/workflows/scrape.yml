name: scrape-and-sync

# Runs the Port Said scraper every 6 hours and pushes the result to Firestore.
#
# Timing notes:
#   - GitHub Actions free tier on private repos: 2,000 min/month.
#   - GitHub's hard ceiling for a single job is 360 min (6h); we use 350
#     to leave a margin for the runner's own teardown.
#   - As the catalogue grows the scrape gets slower; the cap should sit
#     comfortably above the longest observed run, not just the average.
#     A run that's cancelled mid-way leaves Firestore in a half-synced
#     state — better to over-allocate than truncate.
#
# Setup (one-time):
#   1. Repo Settings → Secrets and variables → Actions → New repository secret
#         Name:  FIREBASE_SERVICE_ACCOUNT
#         Value: <paste the entire contents of firebase-service-account.json>
#   2. Push this file to the default branch.
#   3. The workflow fires automatically every 6h. Manual run:
#         Actions → "scrape-and-sync" → Run workflow.

on:
  # Every 6 hours, at minute 17 UTC (offset from the top-of-hour rush).
  schedule:
    - cron: '17 */6 * * *'

  # Manual trigger from the GitHub UI.
  workflow_dispatch:
    inputs:
      categories:
        description: 'Comma-separated category slugs (blank = default 10)'
        required: false
        default: ''
      anchors:
        description: 'Comma-separated anchor ids (blank = default 2)'
        required: false
        default: ''

# Never run two scrapes simultaneously.
concurrency:
  group: scrape
  cancel-in-progress: false

# Opt the workflow into Node 24 runtime for JavaScript actions. The
# `@v4` major versions of actions/checkout, actions/setup-node, etc.
# still ship a Node 20 entry point; GitHub is deprecating Node 20 on
# 16 Sept 2026. Setting this now silences the deprecation warning and
# lets us run on the long-term-supported runtime without waiting for
# every action to publish a `@v5`.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    # GitHub's hard ceiling is 360 min; 350 leaves room for runner
    # teardown + log upload. Previous value was 50 min which started
    # cancelling runs mid-scrape as the catalogue grew.
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Cache Playwright Chromium (~150 MB) so we don't re-download every run.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-1217

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # Persist data/places.json across runs so `first_seen_at` and the
      # accumulated city-wide store survive between scrapes.
      - name: Restore places.json cache
        uses: actions/cache/restore@v4
        with:
          path: data
          key: scraper-store-${{ github.run_id }}
          restore-keys: scraper-store-

      - name: Write Firebase service account from secret
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          mkdir -p secrets
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is missing. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > secrets/firebase-service-account.json
          node -e "JSON.parse(require('fs').readFileSync('secrets/firebase-service-account.json'))" || {
            echo "::error::FIREBASE_SERVICE_ACCOUNT is not valid JSON"
            exit 1
          }

      - name: Run scraper
        env:
          FIRESTORE_PROJECT: port-said-guide
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/secrets/firebase-service-account.json
          # Public base for any URLs the scraper emits. Image URLs default to
          # raw Google CDN now (see config.js); this only matters if you set
          # PROXY_IMAGE_URLS=1 to opt into server-side proxying.
          API_BASE_URL: https://portsaid-guide-backend.onrender.com
        run: |
          ONLY="${{ github.event.inputs.categories }}"
          ANCHORS="${{ github.event.inputs.anchors }}"

          if [ -z "$ONLY" ]; then
            # Default rotation: the high-traffic everyday slugs (food /
            # health / hotel / money / fuel / worship / beach) plus the
            # shopping families the catalogue used to be missing —
            # clothing by demographic, the specialty stores (candy /
            # gift / toys / books / florist / jewelry / stationery)
            # and shoe stores. `--force` is set below so cadence_hours
            # on each entry is ignored for the cron — every category
            # listed here runs on every scheduled run.
            ONLY="restaurant,coffee,pharmacy,hospital,hotel,supermarket,gas-station,bank,mosque,beach,clothing-men,clothing-women,clothing-kids,shoe-store,candy-store,gift-shop,toy-store,bookstore,florist,jewelry,stationery"
          fi
          if [ -z "$ANCHORS" ]; then
            ANCHORS="wide-city,city-center"
          fi

          echo "scraping categories=$ONLY anchors=$ANCHORS"
          node src/run-all.js --force --only="$ONLY" --anchors="$ANCHORS" --delay=8

      - name: Sync to Firestore
        env:
          FIRESTORE_PROJECT: port-said-guide
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/secrets/firebase-service-account.json
        run: node src/sync-firestore.js

      # Save the merged store so the next run inherits first_seen_at etc.
      - name: Save places.json cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data
          key: scraper-store-${{ github.run_id }}

      # Make the store downloadable for inspection (7-day retention).
      - name: Upload store artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: places-store-${{ github.run_id }}
          path: data/places.json
          retention-days: 7

      - name: Run summary
        if: always()
        run: |
          if [ -f data/places.json ]; then
            node -e "
              const s = JSON.parse(require('fs').readFileSync('data/places.json','utf8'));
              const places = Object.values(s.places ?? {});
              console.log('TOTAL:', places.length, 'places');
              const cats = {};
              for (const p of places) for (const c of p.source_categories ?? []) cats[c] = (cats[c] ?? 0) + 1;
              for (const [k,v] of Object.entries(cats).sort((a,b) => b[1] - a[1])) {
                console.log('  ' + k.padEnd(16) + ' ' + v);
              }
            "
          fi
